<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RS3 Archaeology Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Text:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #05080f;
            --bg-panel: #0d1623;
            --gold: #c8a84b;
            --text: #ddd0b8;
            --text-dim: #8a7d65;
            --border: #1f3860;
        }
        body { background: var(--bg-deep); color: var(--text); font-family: 'Crimson Text', serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        h1, h2, h3 { font-family: 'Cinzel', serif; color: var(--gold); }
        header { width: 100%; background: var(--bg-panel); border-bottom: 2px solid var(--gold); padding: 1rem; text-align: center; position: sticky; top: 0; z-index: 100; }
        .stats-bar { display: flex; justify-content: center; gap: 20px; font-size: 0.9rem; margin-top: 10px; }
        nav { margin: 15px 0; display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; }
        button { background: var(--bg-deep); border: 1px solid var(--border); color: var(--text); padding: 8px 15px; cursor: pointer; font-family: 'Cinzel'; }
        button.active { background: var(--gold); color: black; }
        .container { width: 90%; max-width: 1100px; padding: 20px; }
        .card, .mys-card { background: var(--bg-panel); border: 1px solid var(--border); padding: 15px; margin-bottom: 10px; border-radius: 4px; }
        .done { border-left: 5px solid var(--gold); opacity: 0.8; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
        .toolbar { display: flex; gap: 20px; margin-bottom: 20px; padding: 10px; background: var(--bg-panel); border-radius: 4px; }
        .chip { padding: 6px 12px; border: 1px solid var(--border); background: var(--bg-deep); color: var(--text); cursor: pointer; border-radius: 20px; font-size: 0.9rem; }
        .chip.active { background: var(--gold); color: black; border-color: var(--gold); }
        .mys-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .lvl-badge { background: var(--gold); color: black; padding: 2px 8px; border-radius: 3px; font-weight: bold; font-size: 0.85rem; }
        .align-pill { display: inline-block; padding: 4px 10px; border-radius: 4px; font-size: 0.85rem; margin-right: 5px; background: rgba(200,168,75,0.2); }
        .done-check { position: absolute; top: 12px; right: 12px; width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--gold); background: transparent; color: var(--gold); cursor: pointer; font-weight: bold; }
        .done-check.checked { background: var(--gold); color: black; }
        .empty { text-align: center; padding: 60px 20px; color: var(--text-dim); }
    </style>
</head>
<body>

<header>
    <h1>Archaeology Tracker</h1>
    <div class="controls">
        Nível: <span id="level-val">99</span>
        <input type="range" id="level-slider" min="1" max="120" value="99" oninput="setLevel(this.value)">
    </div>
    <div class="stats-bar">
        <span>Concluído: <b id="stat-done">0</b></span>
        <span>Progresso: <b id="stat-pct">0%</b></span>
    </div>
    <nav id="main-nav"></nav>
</header>

<div class="container">
    <div class="tab-panel active" id="tab-overview"><div id="ov-content"></div></div>
    <div class="tab-panel" id="tab-artefacts"><div id="art-content"></div></div>
    <div class="tab-panel" id="tab-mysteries"><div id="mys-content"></div></div>
    <div class="tab-panel" id="tab-collections"><div id="col-content"></div></div>
    <div class="tab-panel" id="tab-research"><div id="res-content"></div></div>
</div>

<script>
// ==================== CONFIG ====================
const CONFIG = {
    dataPath: './data/',
    tabs: [
        { id: 'mysteries',   label: '🔮 Mistérios',    file: 'misterios.json' },
        { id: 'artefacts',   label: '🏺 Artefatos',    file: 'artefacts.json' },
        { id: 'collections', label: '📦 Coleções',     file: 'colecoesn.json' },
        { id: 'research',    label: '📜 Pesquisas',    file: 'pesquisas.json' }
    ]
};

let state = {
    level: 99,
    currentTab: 'mysteries',
    data: {},
    done: new Set()
};

// ==================== LOAD DATA ====================
async function loadJSON(file) {
    try {
        const res = await fetch(CONFIG.dataPath + file);
        if (!res.ok) throw new Error(`Arquivo ${file} não encontrado`);
        return await res.json();
    } catch (e) {
        console.error(e);
        return [];
    }
}

async function loadAllData() {
    console.log("📥 Carregando JSONs...");
    for (const tab of CONFIG.tabs) {
        state.data[tab.id] = await loadJSON(tab.file);
    }
    console.log("✅ Todos os dados carregados");
    initApp();
}

// ==================== HELPER ====================
function isDone(id) { return state.done.has(id); }

function toggleDone(id) {
    if (isDone(id)) state.done.delete(id);
    else state.done.add(id);
    saveProgress();
    renderCurrentTab();
}

function saveProgress() {
    localStorage.setItem('archaeologyTracker', JSON.stringify({
        level: state.level,
        done: Array.from(state.done)
    }));
}

function loadProgress() {
    const saved = JSON.parse(localStorage.getItem('archaeologyTracker') || '{}');
    if (saved.level) state.level = saved.level;
    if (saved.done) state.done = new Set(saved.done);
    document.getElementById('level-slider').value = state.level;
    document.getElementById('level-val').textContent = state.level;
}

// ==================== RENDER FUNCTIONS ====================
function renderMysteries() {
    const data = state.data.mysteries || [];
    let html = `<div class="mys-cards">`;
    
    data.forEach(m => {
        const done = isDone(m.id);
        const locked = m.level > state.level;
        html += `
        <div class="mys-card ${locked ? 'locked-card' : ''} ${done ? 'done' : ''}">
            <span class="lvl-badge">${m.level}</span>
            ${done ? `<button class="done-check checked" onclick="toggleDone('${m.id}')">✓</button>` : `<button class="done-check" onclick="toggleDone('${m.id}')">✓</button>`}
            <h3>${m.name}</h3>
            <p><strong>Local:</strong> ${m.digSite || '—'}</p>
            <p><strong>Alinhamento:</strong> ${m.alignment || '—'}</p>
            <p><strong>Requisitos:</strong> ${m.requirements ? m.requirements.map(r => `${r.skill || r.quest} ${r.level || ''}`).join(' • ') : 'Nenhum'}</p>
            <p><strong>Recompensas:</strong><br>${m.rewards.join('<br>')}</p>
        </div>`;
    });
    html += `</div>`;
    document.getElementById('mys-content').innerHTML = html;
}

function renderArtefacts() {
    const data = state.data.artefacts || [];
    let html = `<div class="mys-cards">`;
    
    data.forEach(a => {
        const done = isDone(a.name);
        const locked = parseInt(a.level) > state.level;
        html += `
        <div class="mys-card ${locked ? 'locked-card' : ''} ${done ? 'done' : ''}">
            <span class="lvl-badge">${a.level}</span>
            ${done ? `<button class="done-check checked" onclick="toggleDone('${a.name}')">✓</button>` : `<button class="done-check" onclick="toggleDone('${a.name}')">✓</button>`}
            <h3>${a.name}</h3>
            <p><strong>XP:</strong> ${a.xp}</p>
            <p><strong>Chronotes:</strong> ${a.chronotes}</p>
            <details>
                <summary>Ver materiais</summary>
                <ul>${a.materials.map(m => `<li>${m}</li>`).join('')}</ul>
            </details>
        </div>`;
    });
    html += `</div>`;
    document.getElementById('art-content').innerHTML = html;
}

function renderCollections() {
    const data = state.data.collections || [];
    let html = `<div class="mys-cards">`;
    
    data.forEach(c => {
        const done = isDone(c.id);
        const locked = c.level > state.level;
        html += `
        <div class="mys-card ${locked ? 'locked-card' : ''} ${done ? 'done' : ''}">
            <span class="lvl-badge">${c.level || '—'}</span>
            ${done ? `<button class="done-check checked" onclick="toggleDone('${c.id}')">✓</button>` : `<button class="done-check" onclick="toggleDone('${c.id}')">✓</button>`}
            <h3>${c.name}</h3>
            <p><strong>Coletor:</strong> ${c.collector || '—'}</p>
            <p><strong>Recompensa:</strong> ${c.rewards}</p>
        </div>`;
    });
    html += `</div>`;
    document.getElementById('col-content').innerHTML = html;
}

function renderResearch() {
    const data = state.data.research || [];
    let html = `<div class="mys-cards">`;
    
    data.forEach(r => {
        const done = isDone(r.id);
        const locked = r.level > state.level;
        html += `
        <div class="mys-card ${locked ? 'locked-card' : ''} ${done ? 'done' : ''}">
            <span class="lvl-badge">${r.level}</span>
            ${done ? `<button class="done-check checked" onclick="toggleDone('${r.id}')">✓</button>` : `<button class="done-check" onclick="toggleDone('${r.id}')">✓</button>`}
            <h3>${r.name}</h3>
            <p>${r.description || ''}</p>
            <p><strong>Recompensa:</strong> ${r.rewards}</p>
        </div>`;
    });
    html += `</div>`;
    document.getElementById('res-content').innerHTML = html;
}

function renderCurrentTab() {
    const tab = state.currentTab;
    if (tab === 'mysteries') renderMysteries();
    else if (tab === 'artefacts') renderArtefacts();
    else if (tab === 'collections') renderCollections();
    else if (tab === 'research') renderResearch();
}

// ==================== NAV & TABS ====================
function renderNav() {
    const nav = document.getElementById('main-nav');
    nav.innerHTML = CONFIG.tabs.map(t => `
        <button onclick="switchTab('${t.id}')" class="${state.currentTab === t.id ? 'active' : ''}">
            ${t.label}
        </button>
    `).join('');
}

function switchTab(tabId) {
    state.currentTab = tabId;
    renderNav();
    renderCurrentTab();
}

// ==================== LEVEL SLIDER ====================
function setLevel(val) {
    state.level = parseInt(val);
    document.getElementById('level-val').textContent = state.level;
    saveProgress();
    renderCurrentTab();
}

// ==================== INIT ====================
function initApp() {
    loadProgress();
    renderNav();
    renderCurrentTab();
}

// ==================== START ====================
loadAllData();
</script>
</body>
</html>
