<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RS3 Archaeology Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Text:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #05080f;
            --bg-panel: #0d1623;
            --gold: #c8a84b;
            --text: #ddd0b8;
            --text-dim: #8a7d65;
            --border: #1f3860;
        }

        body {
            background: var(--bg-deep);
            color: var(--text);
            font-family: 'Crimson Text', serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1, h2, h3 { font-family: 'Cinzel', serif; color: var(--gold); }

        header {
            width: 100%;
            background: var(--bg-panel);
            border-bottom: 2px solid var(--gold);
            padding: 1rem;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        nav {
            margin: 15px 0;
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: var(--bg-deep);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 15px;
            cursor: pointer;
            font-family: 'Cinzel';
        }

        button.active {
            background: var(--gold);
            color: black;
        }

        .container {
            width: 90%;
            max-width: 1000px;
            padding: 20px;
        }

        .card {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 4px;
        }

        .done { border-left: 5px solid var(--gold); opacity: 0.8; }

        input[type="range"] { width: 200px; }
        
        .loading {
            padding: 50px;
            text-align: center;
            font-size: 1.5rem;
        }
    </style>
</head>
<body>

<header>
    <h1>Archaeology Tracker</h1>
    <div class="controls">
        Nível: <span id="level-val">99</span>
        <input type="range" id="level-slider" min="1" max="120" value="99">
    </div>
    <div class="stats-bar">
        <span>Concluído: <b id="stat-done">0</b></span>
        <span>Progresso: <b id="stat-pct">0%</b></span>
    </div>
    <nav id="main-nav">
        <button onclick="setTab('artefacts')" id="btn-artefacts">Artefatos</button>
        <button onclick="setTab('collections')" id="btn-collections">Coleções</button>
        <button onclick="setTab('materials')" id="btn-materials">Materiais</button>
    </nav>
</header>

<div class="container" id="main-content">
    <div class="loading">Carregando dados dos arquivos JSON...</div>
</div>

<script>
/* ═══════════════════════════════════════════════════════
   ESTADO GLOBAL
═══════════════════════════════════════════════════════ */
let DB = { artefacts: [], collections: [], materials: [] };
let state = {
    level: 99,
    tab: 'artefacts',
    done: JSON.parse(localStorage.getItem('arch_done') || '{}')
};

/* ═══════════════════════════════════════════════════════
   CARREGAMENTO DE DADOS (JSON)
═══════════════════════════════════════════════════════ */
async function loadData() {
    try {
        // Tenta carregar os arquivos JSON em paralelo
        const [resArt, resCol, resMat] = await Promise.all([
            fetch('artefacts.json').then(r => r.json()),
            fetch('collections.json').then(r => r.json()),
            fetch('materials.json').then(r => r.json())
        ]);

        DB.artefacts = resArt;
        DB.collections = resCol;
        DB.materials = resMat;

        init();
    } catch (err) {
        document.getElementById('main-content').innerHTML = `
            <div class="card" style="border-color: red;">
                <h2>Erro ao carregar JSON</h2>
                <p>Certifique-se de que os arquivos <b>artefacts.json</b>, <b>collections.json</b> e <b>materials.json</b> estão na mesma pasta.</p>
                <small>${err.message}</small>
            </div>
        `;
    }
}

/* ═══════════════════════════════════════════════════════
   LÓGICA DO APP
═══════════════════════════════════════════════════════ */
function init() {
    document.getElementById('level-slider').addEventListener('input', (e) => {
        state.level = parseInt(e.target.value);
        document.getElementById('level-val').textContent = state.level;
        render();
    });
    render();
}

function setTab(t) {
    state.tab = t;
    render();
}

function toggleDone(id) {
    state.done[id] = !state.done[id];
    localStorage.setItem('arch_done', JSON.stringify(state.done));
    render();
}

function render() {
    // Atualizar botões do menu
    document.querySelectorAll('nav button').forEach(btn => {
        btn.classList.toggle('active', btn.id === `btn-${state.tab}`);
    });

    const content = document.getElementById('main-content');
    let html = '';

    if (state.tab === 'artefacts') {
        const filtered = DB.artefacts.filter(a => a.level <= state.level);
        html = `<h2>Artefatos (Nível ${state.level})</h2>`;
        filtered.forEach(art => {
            const isDone = state.done[art.id];
            html += `
                <div class="card ${isDone ? 'done' : ''}" onclick="toggleDone('${art.id}')" style="cursor:pointer">
                    <b>[Lvl ${art.level}]</b> ${art.name} <br>
                    <small style="color: var(--text-dim)">Local: ${art.site}</small>
                </div>
            `;
        });
    } 
    else if (state.tab === 'materials') {
        html = `<h2>Lista de Materiais</h2>`;
        DB.materials.forEach(mat => {
            html += `<div class="card">${mat.name} - <small>${mat.source}</small></div>`;
        });
    }
    else if (state.tab === 'collections') {
        html = `<h2>Coleções de Museu</h2>`;
        DB.collections.forEach(col => {
            html += `<div class="card"><b>${col.name}</b> (Coletor: ${col.collector})</div>`;
        });
    }

    content.innerHTML = html;
    updateStats();
}

function updateStats() {
    const total = DB.artefacts.filter(a => a.level <= state.level).length;
    const done = DB.artefacts.filter(a => a.level <= state.level && state.done[a.id]).length;
    const pct = total > 0 ? Math.round((done / total) * 100) : 0;

    document.getElementById('stat-done').textContent = done;
    document.getElementById('stat-pct').textContent = pct + '%';
}

// Inicia o processo
loadData();
</script>

</body>
</html>
