<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RS3 Archaeology Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Text:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #05080f;
            --bg-panel: #0d1623;
            --gold: #c8a84b;
            --text: #ddd0b8;
            --text-dim: #8a7d65;
            --border: #1f3860;
        }

        body {
            background: var(--bg-deep);
            color: var(--text);
            font-family: 'Crimson Text', serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1, h2, h3 { font-family: 'Cinzel', serif; color: var(--gold); }

        header {
            width: 100%;
            background: var(--bg-panel);
            border-bottom: 2px solid var(--gold);
            padding: 1rem;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        nav {
            margin: 15px 0;
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: var(--bg-deep);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 15px;
            cursor: pointer;
            font-family: 'Cinzel';
        }

        button.active {
            background: var(--gold);
            color: black;
        }

        .container {
            width: 90%;
            max-width: 1000px;
            padding: 20px;
        }

        .card {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 4px;
        }

        .done { border-left: 5px solid var(--gold); opacity: 0.8; }

        input[type="range"] { width: 200px; }
        
        .loading {
            padding: 50px;
            text-align: center;
            font-size: 1.5rem;
        }
    </style>
</head>
<body>

<header>
    <h1>Archaeology Tracker</h1>
    <div class="controls">
        Nível: <span id="level-val">99</span>
        <input type="range" id="level-slider" min="1" max="120" value="99">
    </div>
    <div class="stats-bar">
        <span>Concluído: <b id="stat-done">0</b></span>
        <span>Progresso: <b id="stat-pct">0%</b></span>
    </div>
    <nav id="main-nav">
        <button onclick="setTab('artefacts')" id="btn-artefacts">Artefatos</button>
        <button onclick="setTab('collections')" id="btn-collections">Coleções</button>
        <button onclick="setTab('materials')" id="btn-materials">Materiais</button>
    </nav>
</header>

<div class="container" id="main-content">
    <div class="loading">Carregando dados dos arquivos JSON...</div>
</div>

<script>
// ═══════════════════════════════════════════════════════
  // CONFIG & STATE
  // ═══════════════════════════════════════════════════════
  const CONFIG = {
    dataPath: './data', // Caminho para seus JSONs (coloque os JSONs na mesma pasta do HTML)
    tabs: [
      { id: 'misterios', label: '🔮 Mistérios', file: 'misterios.json' },
      { id: 'artefatos', label: '🏺 Artefatos', file: 'artefatos.json' },
      { id: 'colecoes', label: '📚 Coleções', file: 'colecoes.json' },
      { id: 'pesquisas', label: '📜 Pesquisas', file: 'pesquisas.json' },
    ]
  };

  let state = {
    currentTab: 'misterios',
    data: {}
  };

  // ═══════════════════════════════════════════════════════
  // DATA LOADING
  // ═══════════════════════════════════════════════════════
  async function loadJSON(filename) {
    try {
      // Usando caminho relativo simples: ./nome-do-arquivo.json
      const response = await fetch(`./${filename}`);
      if (!response.ok) {
        throw new Error(`Erro ${response.status}: O arquivo ${filename} não foi encontrado.`);
      }
      return await response.json();
    } catch (error) {
      console.error(error.message);
      return null;
    }
  }
    
  async function loadAllData() {
    console.log('Carregando dados...');
    for (const tab of CONFIG.tabs) {
      state.data[tab.id] = await loadJSON(tab.file);
    }
    render();
  }

  // ═══════════════════════════════════════════════════════
  // RENDER FUNCTIONS
  // ═══════════════════════════════════════════════════════
  function renderNav() {
    const nav = document.getElementById('nav-tabs');
    nav.innerHTML = CONFIG.tabs
      .map(tab => `
        <button class="${state.currentTab === tab.id ? 'active' : ''}"
                onclick="switchTab('${tab.id}')">
          ${tab.label}
        </button>
      `)
      .join('');
  }

  function renderContent() {
    const content = document.getElementById('content');
    const fileData = state.data[state.currentTab];

    if (!fileData) {
      content.innerHTML = '<div class="loading">Carregando dados (ou arquivo não encontrado)...</div>';
      return;
    }

    // O nosso JSON salvo tem um wrapper { data: [...] }, precisamos pegar a array de dentro
    const currentData = fileData.data;

    if (!currentData || !Array.isArray(currentData)) {
      content.innerHTML = '<div class="error">Formato de dados inválido. O arquivo JSON deve ter uma propriedade "data" contendo uma lista.</div>';
      return;
    }

    if (currentData.length === 0) {
      content.innerHTML = '<div class="loading">Nenhum dado disponível</div>';
      return;
    }

    // Como as colunas variam muito, vamos usar um renderizador genérico inteligente
    content.innerHTML = renderGeneric(currentData, state.currentTab);
  }

  function renderGeneric(data, tabId) {
    return `<div class="grid">
      ${data.map(item => {
        // Ignorar linhas de lixo geradas pela Wiki (ex: "Clear selection")
        if (!item.name || item.name.includes('Clear selection')) return '';

        let bodyHtml = '';
        
        // Pega todas as chaves do tipo col_1, col_2, etc...
        const colKeys = Object.keys(item).filter(k => k.startsWith('col_'));

        colKeys.forEach((key, index) => {
          let text = item[key];
          if (!text) return;

          // Limpa o texto: a Wiki coloca muitos espaços e "shows/hides", vamos limpar e trocar quebras de linha por <br>
          text = text.replace(/show\s+Ironmen:/g, '')
                     .replace(/\n+/g, '<br>')
                     .trim();

          bodyHtml += `
            <p style="margin-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 4px;">
              <strong>Info ${index + 1}:</strong><br>
              <span style="color: var(--textdim);">${text}</span>
            </p>`;
        });

        return `
          <div class="card">
            <div class="card-title">${item.name}</div>
            <div class="card-body">
              ${bodyHtml}
            </div>
          </div>
        `;
      }).join('')}
    </div>`;
  }

  // ═══════════════════════════════════════════════════════
  // CONTROLS
  // ═══════════════════════════════════════════════════════
  function switchTab(tabId) {
    state.currentTab = tabId;
    renderNav();
    renderContent();
  }

  function render() {
    renderNav();
    renderContent();
  }

  // ═══════════════════════════════════════════════════════
  // INIT
  // ═══════════════════════════════════════════════════════
  loadAllData();
</script>

</body>
</html>
